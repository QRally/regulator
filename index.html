<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE REGULATOR v3.3 | SMART COCKPIT</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #050505; --card: #111; --accent: #f1c40f; --safe: #2ecc71; --hold: #e67e22; }
        body { font-family: monospace; background: var(--bg); color: #eee; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: #1a1a1a; padding: 10px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; font-size: 11px; }
        #map { flex: 2; background: #000; filter: grayscale(1) invert(0.9); }
        .dash { padding: 15px; flex: 2; overflow-y: auto; display: flex; flex-direction: column; }
        .clock { font-size: 3rem; text-align: center; font-weight: bold; margin-bottom: 5px; color: #fff; }
        
        .status-pill { 
            padding: 20px; border-radius: 8px; text-align: center; font-weight: 900; font-size: 1.6rem; 
            border: 3px solid #333; text-transform: uppercase; margin-bottom: 15px; transition: all 0.2s ease;
        }
        .state-searching { background: #111; color: #444; border-color: #222; }
        .state-at-point { background: rgba(241, 196, 15, 0.2); color: var(--accent); border-color: var(--accent); animation: pulse 0.8s infinite; }
        .state-hold { background: rgba(230, 126, 34, 0.3); color: var(--hold); border-color: var(--hold); }
        .state-go { background: var(--safe); color: #000; border-color: #fff; box-shadow: 0 0 30px rgba(46, 204, 113, 0.6); }

        .car-info { background: var(--card); padding: 10px; border-radius: 4px; margin-bottom: 10px; border: 1px solid #222; }
        .ledger { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 5px; }
        .ledger td { padding: 10px 5px; border-bottom: 1px solid #1a1a1a; }
        .due-label { font-size: 10px; color: #666; display: block; }
        @keyframes pulse { 50% { opacity: 0.5; border-color: transparent; } }
    </style>
</head>
<body>

    <div class="header">
        <span id="event-name" style="color:var(--accent); font-weight:bold;">SYNCING...</span>
        <span id="cloud-stat" style="color:var(--safe)">CLOUD READY</span>
    </div>

    <div id="map"></div>

    <div class="dash">
        <div class="clock" id="clock">00:00:00</div>
        
        <div class="car-info">
            <input type="number" id="carNum" placeholder="CAR #" value="1" style="background:transparent; border:none; color:var(--accent); text-align:center; font-size:1.4rem; width:100%; outline:none; font-weight:bold;">
        </div>

        <div id="status-pill" class="status-pill state-searching">SEARCHING...</div>

        <table class="ledger">
            <tbody id="ledger-body"></tbody>
        </table>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCLi3NMmoJJCeJFGU4d-N4R47D0qM1r8nU",
        authDomain: "the-regulator-rally.firebaseapp.com",
        databaseURL: "https://the-regulator-rally-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "the-regulator-rally",
        storageBucket: "the-regulator-rally.appspot.com",
        messagingSenderId: "1026958520151",
        appId: "1:1026958520151:web:166551b9b18361668f447d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.pushToCloud = function(car, point, time) {
        update(ref(db, 'Rally_Test/Car_' + (car || "Unknown")), { [point]: time });
    };
</script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, carMarker, points = [], holdTimer = null, currentSpeed = 0;

    // CONFIG - MUST MATCH RESULTS HQ
    const MASTER_START = "14:00:00"; 
    const INTERVAL = 1; 

    map = L.map('map', {zoomControl:false}).setView([52.18, -4.1], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    carMarker = L.circleMarker([0,0], {color: 'red', radius: 6, fillOpacity: 1}).addTo(map);

    async function loadRoute() {
        const routeUrl = './route.json?t=' + Date.now();
        try {
            const resp = await fetch(routeUrl);
            const data = await resp.json();
            document.getElementById('event-name').textContent = data.event_name;
            
            const carNum = parseInt(document.getElementById('carNum').value) || 0;
            points = data.controls.map(c => {
                const [lat, lon] = c.coords.split(',').map(n => parseFloat(n.trim()));
                L.circle([lat, lon], {radius: 50, color: '#444', weight: 1, fillOpacity: 0.1}).addTo(map);
                
                return {
                    name: c.id, lat, lon, type: c.type,
                    due: calculateDueTime(carNum, c.target_mins),
                    time: null, inZone: false
                };
            });
            refreshLedger();
        } catch (e) { setTimeout(loadRoute, 5000); }
    }

    function calculateDueTime(carNum, targetMins) {
        if (!targetMins) return "---";
        const [h, m, s] = MASTER_START.split(':').map(Number);
        const due = new Date(2026, 3, 1, h, m + (carNum * INTERVAL) + targetMins, s);
        return due.toTimeString().split(' ')[0];
    }

    document.getElementById('carNum').addEventListener('input', loadRoute);

    navigator.geolocation.watchPosition(pos => {
        const cur = L.latLng(pos.coords.latitude, pos.coords.longitude);
        currentSpeed = pos.coords.speed ? (pos.coords.speed * 2.23694) : 0;
        carMarker.setLatLng(cur);
        if (points.length > 0) map.panTo(cur);
    }, null, {enableHighAccuracy: true});

    setInterval(() => {
        document.getElementById('clock').textContent = new Date().toTimeString().split(' ')[0];
        checkLogic();
    }, 400);

    function checkLogic() {
        const carPos = carMarker.getLatLng();
        let activeInRange = false;

        points.forEach(p => {
            if (p.time) return;
            const dist = map.distance(carPos, [p.lat, p.lon]);
            if (dist < 50) {
                activeInRange = true;
                if (!p.inZone) {
                    if (currentSpeed < 5) { p.inZone = true; startHold(p); }
                    else { statusUpdate("SLOW DOWN!", "state-at-point"); }
                }
            } else if (p.inZone && !p.time) {
                p.inZone = false; clearInterval(holdTimer); holdTimer = null;
                statusUpdate("SEARCHING...", "state-searching");
            }
        });
        if (!activeInRange && !holdTimer) statusUpdate("SEARCHING...", "state-searching");
    }

    function startHold(p) {
        let count = 10;
        statusUpdate(`HOLDING: ${count}s`, "state-hold");
        holdTimer = setInterval(() => {
            count--;
            if (count > 0) statusUpdate(`HOLDING: ${count}s`, "state-hold");
            else {
                clearInterval(holdTimer); holdTimer = null;
                const timeNow = new Date().toTimeString().split(' ')[0];
                p.time = timeNow;
                statusUpdate("GO! GO! GO!", "state-go");
                if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
                window.pushToCloud(document.getElementById('carNum').value, p.name, timeNow);
                refreshLedger();
                setTimeout(() => { if(!holdTimer) statusUpdate("SEARCHING...", "state-searching"); }, 8000);
            }
        }, 1000);
    }

    function statusUpdate(txt, cls) {
        const s = document.getElementById('status-pill');
        if(s.textContent !== txt) { s.textContent = txt; s.className = `status-pill ${cls}`; }
    }

    function refreshLedger() {
        document.getElementById('ledger-body').innerHTML = points.map(p => `
            <tr style="color:${p.time ? 'var(--safe)' : '#eee'}">
                <td><span class="due-label">CONTROL</span>${p.name}</td>
                <td><span class="due-label">DUE</span>${p.due}</td>
                <td style="text-align:right;"><span class="due-label">ACTUAL</span>${p.time || '---'}</td>
            </tr>
        `).join('');
    }

    window.onload = loadRoute;
</script>
</body>
</html>
